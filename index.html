<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Signal Tracker</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="earth-app">
    <section class="globe-stage panel">
      <canvas id="globe-canvas" width="900" height="900" aria-label="interactive earth"></canvas>

      <header class="top-bar">
        <div class="brand">Geo Signal Tracker | Space Explorer</div>
        <form id="strike-form" autocomplete="off" class="search-wrap">
          <input id="coord-input" name="coord" type="text" placeholder="좌표 입력: 37.5665, 126.9780" required />
          <button id="fire-btn" type="submit">Scan</button>
        </form>
      </header>

      <aside class="left-panel panel">
        <p class="eyebrow">Orbital Mode</p>
        <h1>Earth From Space</h1>
        <p class="sub">우주에서 지구를 바라보는 탐색 화면입니다. 드래그로 회전하고, 실제 위도/경도로 스캔하세요.</p>

        <form class="scan-form">
          <button id="scan-btn" class="secondary" type="button">New Sweep</button>
        </form>

        <div class="hud-grid">
          <div class="stat"><span>Score</span><strong id="score">0</strong></div>
          <div class="stat"><span>Scans</span><strong id="shots">0</strong></div>
          <div class="stat"><span>Detections</span><strong id="hits">0</strong></div>
          <div class="stat"><span>Cooldown</span><strong id="cooldown">Ready</strong></div>
        </div>

        <details class="drawer" open>
          <summary>Signal Nodes</summary>
          <ul id="node-list"></ul>
        </details>

        <details class="drawer">
          <summary>Mission Log</summary>
          <ul id="log"></ul>
        </details>
      </aside>

      <div class="map-tools">
        <button id="compass-btn" aria-label="Reset north">
          <span id="compass-needle">▲</span>
        </button>
        <button id="zoom-in" aria-label="Zoom in">+</button>
        <button id="zoom-out" aria-label="Zoom out">-</button>
        <button id="tilt-up" aria-label="Tilt up">⌃</button>
        <button id="tilt-down" aria-label="Tilt down">⌄</button>
        <button id="reset-view" aria-label="Reset view">N</button>
      </div>

      <footer class="status-bar">
        <span id="view-coord">Lat ---, Lon ---</span>
        <span id="view-zoom">Zoom x1.00</span>
        <span id="view-heading">Heading ---</span>
        <span id="view-tilt">Tilt ---</span>
        <span id="view-alt">Alt --- km</span>
        <span>Orbit navigation enabled</span>
      </footer>
    </section>
  </main>

  <script defer src="/main.js"></script>
</body>
</html>
