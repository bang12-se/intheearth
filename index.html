<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo Signal Tracker</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="app">
    <header class="panel header">
      <p class="eyebrow">Orbital Monitor</p>
      <h1>Geo Signal Tracker</h1>
      <p class="sub">지구를 드래그해 회전하고, 현실 위도/경도 좌표로 가상 신호원을 탐지합니다.</p>
    </header>

    <section class="panel hud">
      <div class="stat"><span>Score</span><strong id="score">0</strong></div>
      <div class="stat"><span>Scans</span><strong id="shots">0</strong></div>
      <div class="stat"><span>Detections</span><strong id="hits">0</strong></div>
      <div class="stat"><span>Cooldown</span><strong id="cooldown">Ready</strong></div>
    </section>

    <section class="layout">
      <section class="panel globe-panel">
        <div class="panel-head">
          <h2>Earth View</h2>
          <p>Drag to rotate</p>
        </div>
        <canvas id="globe-canvas" width="760" height="760" aria-label="interactive earth"></canvas>
      </section>

      <aside class="panel controls">
        <h2>Scan Console</h2>
        <form id="strike-form" autocomplete="off">
          <label for="coord-input">Latitude, Longitude</label>
          <div class="input-row">
            <input id="coord-input" name="coord" type="text" placeholder="예: 37.5665, 126.9780" required />
            <button id="fire-btn" type="submit">Scan</button>
          </div>
        </form>

        <p class="hint">탐지 반경은 약 220km입니다. 좌표를 입력해 가장 가까운 신호원을 찾아보세요.</p>
        <button id="scan-btn" class="secondary" type="button">New Sweep</button>

        <div class="node-wrap">
          <h3>Signal Nodes</h3>
          <ul id="node-list"></ul>
        </div>

        <div class="log-wrap">
          <h3>Mission Log</h3>
          <ul id="log"></ul>
        </div>
      </aside>
    </section>
  </main>

  <script defer src="/main.js"></script>
</body>
</html>
